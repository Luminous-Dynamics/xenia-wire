name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  RUSTFLAGS: -D warnings
  RUSTDOCFLAGS: -D warnings

jobs:
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - name: Clippy (default features)
        run: cargo clippy --all-targets -- -D warnings
      - name: Clippy (no default features)
        run: cargo clippy --no-default-features --all-targets -- -D warnings
      - name: Clippy (all features)
        run: cargo clippy --all-features --all-targets -- -D warnings

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        features:
          - "" # default
          - "--no-default-features"
          - "--all-features"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Use --tests to exercise unit + integration tests without
      # running doctests. The lib.rs module-level doctest exercises
      # the reference-frame quick-start and fails to compile when
      # --no-default-features is set; we run doctests in a separate
      # step that skips that matrix cell.
      - run: cargo test --tests ${{ matrix.features }}
      - if: matrix.features != '--no-default-features'
        run: cargo test --doc ${{ matrix.features }}

  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - name: Build (default features)
        run: cargo build --all-targets
      - name: Build (all features)
        run: cargo build --all-features --all-targets

  docs:
    name: Docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --all-features --no-deps

  wasm32:
    name: WebAssembly (wasm32-unknown-unknown)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: Build (no default features)
        run: cargo build --target wasm32-unknown-unknown --no-default-features
      - name: Build (default features)
        run: cargo build --target wasm32-unknown-unknown
      - name: Build (all features)
        run: cargo build --target wasm32-unknown-unknown --all-features

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Library crate: Cargo.lock is gitignored. Generate it for the
      # audit run against the current registry rather than committing a
      # checked-in lockfile that would drift.
      - name: Generate Cargo.lock
        run: cargo generate-lockfile
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo audit
        # RUSTSEC-2025-0141: bincode v1 flagged as unmaintained (v2 is out).
        # We deliberately pin bincode v1 because SPEC §12.3 specifies
        # bincode v1's default-little-endian fixint as the canonical
        # encoding for consent-signature bodies. Migrating to v2 is a
        # breaking wire-format change that has to go through a spec bump,
        # not a silent dependency bump. Tracked as a v1.0-blocker
        # decision, not a CI-blocking vulnerability.
        run: cargo audit --deny warnings --ignore RUSTSEC-2025-0141
